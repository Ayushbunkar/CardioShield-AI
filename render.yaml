# =============================================================================
# CardioShield AI — Render Blueprint (all 3 services)
# =============================================================================
# Deploy:  Push to GitHub → Render Dashboard → New Blueprint → connect repo
# =============================================================================

services:
  # ─────────────────────────────────────────────
  # 1. AI Flask Backend (Python)
  # ─────────────────────────────────────────────
  - type: web
    name: cardioshield-ai
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CORS_ORIGINS
        sync: false    # You fill this after deploy

  # ─────────────────────────────────────────────
  # 2. Express Backend (Node.js)
  # ─────────────────────────────────────────────
  - type: web
    name: cardioshield-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb+srv://ayushbunkar100:Ayush_Bunkar_2005@ayushkadatabase.uogh5vj.mongodb.net/CardioShieldAi?retryWrites=true&w=majority&appName=CardioShieldAI
      - key: JWT_SECRET
        value: cardioshield_jwt_secret_key_2024
      - key: AI_BACKEND_URL
        sync: false    # Set to your AI backend Render URL after it deploys
      - key: CORS_ORIGINS
        sync: false    # Set to your client Render URL after it deploys
      - key: CLOUDINARY_CLOUD_NAME
        value: dx7ztr9i3
      - key: CLOUDINARY_API_KEY
        value: "313846931262354"
      - key: CLOUDINARY_API_SECRET
        value: f1TAhJDmQ9FWAu9HTnWacMy9Rn0

  # ─────────────────────────────────────────────
  # 3. React Frontend (Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: cardioshield-client
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      - key: VITE_SERVER_URL
        sync: false
      - key: VITE_AI_API_URL
        sync: false
