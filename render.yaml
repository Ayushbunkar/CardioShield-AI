# CardioShield AI — Render Blueprint (render.yaml)
# =================================================
# Deploy all 3 services with: https://render.com/deploy
#
# Architecture:
#   React (Static Site) → Express (Web Service) → Flask (Web Service)
#   Client calls Express for auth/data, Flask for AI predictions.

services:
  # ─── 1. Flask AI Backend ──────────────────────────────────
  - type: web
    name: cardioshield-ai
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false                  # Set manually after deploy
      - key: PYTHON_VERSION
        value: 3.11.9

  # ─── 2. Express Server ────────────────────────────────────
  - type: web
    name: cardioshield-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_BACKEND_URL
        fromService:
          name: cardioshield-ai
          type: web
          property: hostport
      - key: MONGO_URI
        sync: false                  # Set manually (MongoDB Atlas free tier)
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false                  # Set manually after deploy
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ─── 3. React Frontend ────────────────────────────────────
  - type: web
    name: cardioshield-client
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          name: cardioshield-server
          type: web
          property: host
      - key: VITE_AI_API_URL
        fromService:
          name: cardioshield-ai
          type: web
          property: host
