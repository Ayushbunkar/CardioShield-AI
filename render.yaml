# =============================================================================
# CardioShield AI — Render Blueprint (all 3 services)
# =============================================================================
# Deploy:  Push to GitHub → Render Dashboard → New Blueprint → connect repo
# =============================================================================

services:
  # ─────────────────────────────────────────────
  # 1. AI Flask Backend (Python)
  # ─────────────────────────────────────────────
  # URL: https://navkalpana-ricr-nk-0040-ai-backend.onrender.com
  - type: web
    name: cardioshield-ai
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --preload
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # CORS: Allow the Express server to call Flask (proxy requests)
      # Also allow the client origin as fallback
      - key: CORS_ORIGINS
        sync: false
        # Set in Render Dashboard to:
        # https://navkalpana-ricr-nk-0040.onrender.com,https://navkalpana-ricr-nk-0040-h64h.onrender.com

  # ─────────────────────────────────────────────
  # 2. Express Backend (Node.js)
  # ─────────────────────────────────────────────
  # URL: https://navkalpana-ricr-nk-0040.onrender.com
  - type: web
    name: cardioshield-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb+srv://ayushbunkar100:Ayush_Bunkar_2005@ayushkadatabase.uogh5vj.mongodb.net/CardioShieldAi?retryWrites=true&w=majority&appName=CardioShieldAI
      - key: JWT_SECRET
        value: cardioshield_jwt_secret_key_2024
      # CRITICAL: Must be the internal Render URL of the Flask service
      - key: AI_BACKEND_URL
        value: https://navkalpana-ricr-nk-0040-ai-backend.onrender.com
      # CRITICAL: Must be the client URL on Render
      - key: CORS_ORIGINS
        value: https://navkalpana-ricr-nk-0040-h64h.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        value: dx7ztr9i3
      - key: CLOUDINARY_API_KEY
        value: "313846931262354"
      - key: CLOUDINARY_API_SECRET
        value: f1TAhJDmQ9FWAu9HTnWacMy9Rn0

  # ─────────────────────────────────────────────
  # 3. React Frontend (Static Site)
  # ─────────────────────────────────────────────
  # URL: https://navkalpana-ricr-nk-0040-h64h.onrender.com
  # NOTE: VITE_ env vars are baked at BUILD TIME. After changing,
  #        you MUST trigger a manual deploy or push a new commit.
  - type: web
    name: cardioshield-client
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      # CRITICAL: Must be the Express server URL (NOT the Flask AI backend!)
      # All AI calls go through Express proxy: /ai → Flask
      - key: VITE_SERVER_URL
        sync: false
        # Set in Render Dashboard to:
        # https://navkalpana-ricr-nk-0040.onrender.com
      # DO NOT set VITE_AI_API_URL — it is intentionally removed.
      # The client always uses ${VITE_SERVER_URL}/ai to route through Express.
