# =============================================================================
# CardioShield AI — Render Blueprint (all 3 services)
# =============================================================================
# Deploy:  Push to GitHub → Render Dashboard → New Blueprint → connect repo
# =============================================================================

services:
  # ─────────────────────────────────────────────
  # 1. AI Flask Backend (Python)
  # ─────────────────────────────────────────────
  # URL: https://navkalpana-ricr-nk-0040-ai-backend.onrender.com
  - type: web
    name: cardioshield-ai
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-backend
    buildCommand: pip install -r requirements.txt
    # Use an env var `GUNICORN_WORKERS` to configure worker count at deploy time.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers ${GUNICORN_WORKERS:-1} --preload
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # CORS: Allow the Express server to call Flask (proxy requests)
      # Also allow the client origin as fallback
      - key: CORS_ORIGINS
        sync: false
        # Set in Render Dashboard to:
        # https://navkalpana-ricr-nk-0040.onrender.com,https://navkalpana-ricr-nk-0040-h64h.onrender.com

  # ─────────────────────────────────────────────
  # 2. Express Backend (Node.js)
  # ─────────────────────────────────────────────
  # URL: https://navkalpana-ricr-nk-0040.onrender.com
  - type: web
    name: cardioshield-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    # Use `npm ci` for reproducible installs and faster CI caching (requires lockfile).
    buildCommand: npm ci
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
        value: "<SET_MONGO_URI_IN_DASHBOARD>"
      - key: JWT_SECRET
        sync: false
        value: "<SET_JWT_SECRET_IN_DASHBOARD>"
      # CRITICAL: Must be the internal Render URL of the Flask service
      - key: AI_BACKEND_URL
        value: https://navkalpana-ricr-nk-0040-ai-backend.onrender.com
      # CRITICAL: Must be the client URL on Render
      - key: CORS_ORIGINS
        value: https://navkalpana-ricr-nk-0040-h64h.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
        value: "<SET_CLOUDINARY_CLOUD_NAME>"
      - key: CLOUDINARY_API_KEY
        sync: false
        value: "<SET_CLOUDINARY_API_KEY>"
      - key: CLOUDINARY_API_SECRET
        sync: false
        value: "<SET_CLOUDINARY_API_SECRET>"

  # ─────────────────────────────────────────────
  # 3. React Frontend (Static Site)
  # ─────────────────────────────────────────────
  # URL: https://navkalpana-ricr-nk-0040-h64h.onrender.com
  # NOTE: VITE_ env vars are baked at BUILD TIME. After changing,
  #        you MUST trigger a manual deploy or push a new commit.
  - type: web
    name: cardioshield-client
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    # Use `npm ci` for reproducible installs and to leverage CI caches.
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    envVars:
      # CRITICAL: Must be the Express server URL (NOT the Flask AI backend!)
      # All AI calls go through Express proxy: /ai → Flask
      - key: VITE_SERVER_URL
        sync: false
        # Set in Render Dashboard to:
        # https://navkalpana-ricr-nk-0040.onrender.com
      # DO NOT set VITE_AI_API_URL — it is intentionally removed.
      # The client always uses ${VITE_SERVER_URL}/ai to route through Express.
